services:
  - type: web
    name: intellekt-plus-schedule
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: intellekt-plus-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: intellekt-plus-db
    plan: free
    databaseName: intellekt_plus
    user: intellekt_plus
